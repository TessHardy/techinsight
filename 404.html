<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面未找到 | TechInsight</title>
<meta name="theme-color" content="#0a0e17">
<meta name="description" content="页面未找到 - 返回 TechInsight 技术洞察首页">
<style>
:root{
  --bg-primary:#0a0e17;
  --bg-card:#1a1f2e;
  --text-primary:#e2e8f0;
  --text-secondary:#94a3b8;
  --accent-blue:#3b82f6;
  --accent-purple:#8b5cf6;
  --accent-cyan:#06b6d4;
  --border-color:rgba(255,255,255,0.08);
}
[data-theme="light"]{
  --bg-primary:#f8fafc;
  --bg-card:#fff;
  --text-primary:#1e293b;
  --text-secondary:#64748b;
  --border-color:rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;transition:background 0.3s,color 0.3s}
.error-content{max-width:480px;animation:fadeIn 0.6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.error-code{font-size:9rem;font-weight:900;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.error-title{font-size:1.5rem;margin-bottom:0.5rem;font-weight:700}
.error-desc{color:var(--text-secondary);margin-bottom:2rem;line-height:1.6;font-size:0.95rem}
.error-actions{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap}
.error-btn{padding:0.7rem 1.5rem;border-radius:8px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));color:#fff;text-decoration:none;font-weight:600;transition:all 0.2s;display:inline-block;border:none;cursor:pointer;font-size:0.95rem}
.error-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,0.4)}
.error-btn.secondary{background:rgba(255,255,255,0.1);color:var(--text-primary);border:1px solid var(--border-color)}
.error-hint{margin-top:2rem;padding:1rem;background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;font-size:0.8rem;color:var(--text-secondary);font-family:'Fira Code','Consolas',monospace}
.kbd{display:inline-block;padding:0.15rem 0.4rem;background:rgba(59,130,246,0.15);color:var(--accent-cyan);border-radius:4px;font-size:0.75rem;margin:0 0.2rem}
</style>
</head>
<body>
<main class="error-content">
  <div class="error-code" aria-hidden="true">404</div>
  <h1 class="error-title">页面走丢了 🚀</h1>
  <p class="error-desc">你要找的页面可能去了月球，或者从未存在过。<br>不如回首页看看其他精彩内容？</p>
  <div class="error-actions">
    <a href="./" class="error-btn">🏠 返回首页</a>
    <a href="javascript:history.back()" class="error-btn secondary">← 返回上一页</a>
  </div>
  <p class="error-hint">💡 小贴士：在首页按 <span class="kbd">?</span> 可调出快捷键面板</p>
</main>
<script>
// 主题同步
try{
  var t=localStorage.getItem('theme');
  if(t==='light'||t==='dark')document.body.setAttribute('data-theme',t);
}catch(e){}
</script>
</body>
</html>
